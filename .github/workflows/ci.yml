name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.21", "1.22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test ./... -v -count=1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: mkdir -p dist
      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/oc-tasks-linux-amd64 ./cmd/oc-tasks/
      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/oc-tasks-darwin-amd64 ./cmd/oc-tasks/
      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/oc-tasks-darwin-arm64 ./cmd/oc-tasks/
      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/oc-tasks-linux-arm64 ./cmd/oc-tasks/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
